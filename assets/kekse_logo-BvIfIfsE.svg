<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Montserrat:wght@400;600&amp;display=swap');
      .logo-icon-circle {
        fill: none;
        stroke: #3D251E;
        stroke-width: 4.5;
      }
      .logo-icon-k {
        fill: #3D251E;
      }
      .logo-icon-cookie-outline {
        fill: none;
        stroke: #3D251E;
        stroke-dasharray: none;
        stroke-width: 4.5;
      }
      .logo-icon-cookie-bite {
        fill: none;
        stroke: #FAF7F2;
        stroke-width: 6;
      }
      .logo-icon-dot {
        fill: #3D251E;
      }
      .logo-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 800;
        fill: #3D251E;
        font-size: 72px;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      .logo-subtitle {
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;
        fill: #5A3B32;
        font-size: 16px;
        text-anchor: middle;
        letter-spacing: 8px;
      }
    </style>
  </defs>

  <!-- Background (Clean cream page background) -->
  <rect width="100%" height="100%" fill="#FAF7F2" />

  <!-- Logo Emblem (Circle + stylized K + cookie) -->
  <g transform="translate(300, 110)">
    <!-- Outer Circle -->
    <circle cx="0" cy="0" r="55" class="logo-icon-circle" />
    
    <!-- Stylized K (Left Stem) -->
    <path d="M -23 -33 C -23 -33 -23 -33 -23 -33 L -17 -33 L -17 33 L -23 33 Z" class="logo-icon-k" />
    
    <!-- Stylized K (Diagonals) -->
    <path d="M -17 -4 L 14 -33 L 23 -33 L -7 4 Z" class="logo-icon-k" />
    <path d="M -9 -1 L 23 33 L 14 33 L -17 -1 Z" class="logo-icon-k" />

    <!-- Cookie Shape (Right side, bitten) -->
    <!-- Outer boundary of cookie -->
    <path d="M 12 -15 C 24 -15 35 -6 35 7 C 35 12 32 15 29 18 C 24 23 15 27 6 22" class="logo-icon-cookie-outline" fill="none" />
    
    <!-- Cookie bites on the edge (Using clean overlapping arcs to show bite marks) -->
    <path d="M 33 -5 A 6 6 0 0 1 29 5 A 6 6 0 0 1 26 13" fill="none" stroke="#FAF7F2" stroke-width="7" />
    <!-- Re-draw bite outlines for definition -->
    <path d="M 35 -5 C 31 -3 30 2 31 5 C 28 7 27 11 29 14" fill="none" stroke="#3D251E" stroke-width="4.5" />

    <!-- Chocolate chip dots -->
    <circle cx="15" cy="-2" r="3.5" class="logo-icon-dot" />
    <circle cx="23" cy="5" r="3.5" class="logo-icon-dot" />
    <circle cx="16" cy="12" r="3.5" class="logo-icon-dot" />
  </g>

  <!-- Logo Text -->
  <text x="300" y="260" class="logo-title">KEKSE</text>
  <text x="304" y="305" class="logo-subtitle">PREMIUM COOKIES</text>
</svg>
